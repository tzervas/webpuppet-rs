name: CI

# Local SoT: ./scripts/check.sh (fmt, clippy -D warnings, build, test).
# Also runs on push/PR to main|dev|develop and workflow_dispatch.
on:
  push:
    branches:
      - main
      - dev
      - develop
  pull_request:
    branches:
      - main
      - dev
      - develop
  workflow_dispatch:

permissions:
  contents: read
  checks: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-test:
    name: Build and Test (local parity)
    runs-on: [self-hosted, linux, x64, podman]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config || true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: embeddenator-webpuppet

      - name: Local-parity checks
        working-directory: .
        run: bash scripts/check.sh
