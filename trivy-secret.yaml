# Trivy secret-scanner configuration.
#
# Scoped by CONTENT SHAPE, never by file path. A path-scoped exclusion would
# silently stop scanning a whole file, so a genuine credential later added to
# src/security/secrets.rs would go unreported. The rules below instead describe
# the shape of the placeholder itself, so they can only ever suppress a string
# that is provably not a credential -- no matter which file it appears in.

allow-rules:
  - id: sequential-alphabet-placeholder-token
    description: >-
      Placeholder VCS tokens whose body is the ASCII alphabet in strict
      sequence (ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmn...). This is the
      fixture shape used by this crate's own secret-detector unit tests -- the
      detector must be handed a string that matches the real token grammar in
      order to assert that it fires. A credential minted by GitHub is 40+
      characters of base62 drawn from a CSPRNG; the probability that it spells
      the alphabet in order is ~62^-26. Any token that does NOT spell the
      alphabet in order -- including every real one -- is still reported.
    regex: (?:gh[pousr]|github_pat)_(?:ABCDEFGHIJKLMNOPQRSTUVWXYZ|abcdefghijklmnopqrstuvwxyz)
